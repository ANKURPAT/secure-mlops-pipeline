# kind cluster config — single node, port mappings for local access
apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30800  # fraud-api NodePort
        hostPort: 8000
        protocol: TCP
      - containerPort: 30500  # mlflow NodePort
        hostPort: 5000
        protocol: TCP